# The SAFE-DEFAULT (no opt-in) counterpart to `dedup_graphql`. repo-x and repo-y
# each declare `Query.getUser` in their own schema and DO NOT declare an api id,
# so the default api_id is the repo name. The two keys therefore namespace apart
# into TWO canonical GraphqlField nodes — repos never merge a shared key without a
# positive declaration (B6 fix). This is a v1 manifest (no `[[repos.apis]]`).

[workspace]
name = "dedup-gql-undeclared-estate"

[[repos]]
name = "repo-x"
path = "repo-x"

[[repos]]
name = "repo-y"
path = "repo-y"

# The user service GraphQL schema (the contract) — repo-schema PRODUCES it.
# Root fields: Query.getUser, Query.listUsers, Mutation.createUser.

type User {
  id: ID!
  name: String!
}

input UserInput {
  name: String!
}

type Query {
  getUser(id: ID!): User
  listUsers: [User!]!
}

type Mutation {
  createUser(input: UserInput!): User
}
